name: Release

on:
  push:
    branches:
      - main
      - 'rc/**'

env:
  devImage: ghcr.io/${{ github.repository }}-devcontainer
  mavenCacheVolume: devcontainer-maven-cache-${{ github.event.repository.name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Restore Maven cache volume
        id: restore_maven_cache
        uses: BYK/docker-volume-cache-action/restore@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # v1
        with:
          key: maven-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-m2-
          volumes: ${{ env.mavenCacheVolume }}

      - name: Release
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: ${{ env.devImage }}
          cacheFrom: ${{ env.devImage }}
          runCmd: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            echo "$GITEA_PASSWORD" | docker login gitea.psi.ch -u "$GITEA_USERNAME" --password-stdin

            npm install --prefix .github/semantic-release
            npx --prefix .github/semantic-release semantic-release
          env: |
            CI=true
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            GITHUB_ACTION=${{ github.action }}
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_REPOSITORY=${{ github.repository }}
            GITHUB_REF=${{ github.ref }}
            GITHUB_SHA=${{ github.sha }}
            GITHUB_WORKFLOW=${{ github.workflow }}
            GITHUB_RUN_ID=${{ github.run_id }}
            GITHUB_RUN_NUMBER=${{ github.run_number }}
            GITEA_USERNAME=${{ secrets.GITEA_USERNAME }}
            GITEA_PASSWORD=${{ secrets.GITEA_PASSWORD }}
