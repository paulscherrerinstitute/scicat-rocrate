rocrate:
  archive-directory: /rocrate/local/archive
  extract-directory: /rocrate/local/extract

quarkus:
  test:
    container:
      network: host
  container-image:
    build: true
    registry: ghcr.io
    group: paulscherrerinstitute
    name: scicat-rocrate
    tag: ${quarkus.application.version:latest}
  log:
    level: INFO
  http:
    test-port: 9999
  rest-client:
    logging:
      scope: request-response
    scicat:
      url: http://backend.localhost
    s3broker:
      url: http://s3-broker.localhost
  smallrye-openapi:
    path: /openapi-specs
  smallrye-health:
    openapi:
      included: true
    root-path: /api/v1/health
  swagger-ui:
    path: /explorer
    always-include: true

titanium:
  jsonld:
    cache:
      size: 10
