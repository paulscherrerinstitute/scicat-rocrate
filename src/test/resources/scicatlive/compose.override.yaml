services:
  keycloak:
    image: tianon/true
    scale: 0
  ldap:
    image: tianon/true
    scale: 0
  opensearch:
    image: tianon/true
    scale: 0
  backend:
    environment:
      - SITE=PSI
      - OPENSEARCH_ENABLED=false
      - OIDC_ISSUER=
    configs:
      - source: functionalAccounts
        target: /home/node/app/functionalAccounts.json
    depends_on: !override
      mongodb:
        condition: service_started
  s3-broker:
    image: ghcr.io/paulscherrerinstitute/scicat-s3-broker:0.4.1
    labels:
      - traefik.http.services.s3-broker.loadbalancer.server.port=8080
    configs:
      - source: s3-config
        target: /env/config
      - source: s3-credentials
        target: /env/credentials
    environment:
    - SCICAT_URL=http://backend:3000
    - JOB_MANAGER_USERNAME=admin
    - JOB_MANAGER_PASSWORD=2jf70TPNZsS
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

configs:
  functionalAccounts:
    content: |
      [
        {
          "username": "admin",
          "password": "2jf70TPNZsS",
          "email": "scicatadmin@your.site",
          "role": "admin"
        },
        {
          "username": "ingestor",
          "password": "aman",
          "email": "scicatingestor@your.site",
          "role": "ingestor"
        },
        {
          "username": "archiveManager",
          "password": "aman",
          "email": "scicatarchivemanager@your.site",
          "role": "archivemanager"
        },
        {
          "username": "proposalIngestor",
          "password": "aman",
