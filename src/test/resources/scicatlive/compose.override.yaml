services:
  keycloak:
    image: tianon/true
    scale: 0
  ldap:
    image: tianon/true
    scale: 0
  opensearch:
    image: tianon/true
    scale: 0
  backend:
    environment:
      - SITE=PSI
      - OPENSEARCH_ENABLED=false
      - OIDC_ISSUER=
    configs:
      - source: functionalAccounts
        target: /home/node/app/functionalAccounts.json
    depends_on: !override
      mongodb:
        condition: service_started
  s3-broker:
    image: ghcr.io/paulscherrerinstitute/scicat-s3-broker:0.5.1
    labels:
      - traefik.http.services.s3-broker.loadbalancer.server.port=8080
    configs:
      - source: s3-config
        target: /env/config
      - source: s3-credentials
        target: /env/credentials
    environment:
    - SCICAT_URL=http://backend:3000
    - JOB_MANAGER_USERNAME=admin
    - JOB_MANAGER_PASSWORD=2jf70TPNZsS
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
  mongodb:
    configs:
      - source: mongodb_seed_job_json
        target: /seed/Job.json

configs:
  functionalAccounts:
    content: |
      [
        {
          "username": "admin",
          "password": "2jf70TPNZsS",
          "email": "scicatadmin@your.site",
          "role": "admin"
        },
        {
          "username": "ingestor",
          "password": "aman",
          "email": "scicatingestor@your.site",
          "role": "ingestor"
        },
        {
          "username": "archiveManager",
          "password": "aman",
          "email": "scicatarchivemanager@your.site",
          "role": "archivemanager"
        },
        {
          "username": "proposalIngestor",
          "password": "aman",
          "email": "scicatproposalingestor@your.site",
          "role": "proposalingestor"
        },
        {
          "username": "rocrate",
          "email": "rocrate@your.site",
          "password": "rocrate",
          "role": "rocrate",
          "global": false
        }
      ]
  s3-config:
    content: |
      [profile ceph]
      endpoint_url = https://rgw.cscs.ch
      region = us-east-1
  s3-credentials:
    content: |
      [ceph]
      aws_access_key_id=<your aws_access_key_id>
      aws_secret_access_key=<your aws_secret_access_key>
